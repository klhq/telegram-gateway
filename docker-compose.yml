version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=/app/config.json
    volumes:
      - ./docker/config.json:/app/config.json:ro
    depends_on:
      - receiver-a
      - receiver-b

  receiver-a:
    image: golang:1.26-alpine
    volumes:
      - .:/src
    working_dir: /src
    command: go run ./cmd/mock-receiver/main.go -port 8081 -secret dev-webhook-secret
    ports:
      - "8081:8081"

  receiver-b:
    image: golang:1.26-alpine
    volumes:
      - .:/src
    working_dir: /src
    command: go run ./cmd/mock-receiver/main.go -port 8082 -secret dev-webhook-secret
    ports:
      - "8082:8082"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway

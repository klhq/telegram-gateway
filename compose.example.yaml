name: telegram-gateway

services:
  gateway:
    image: ${TELEGRAM_GATEWAY_IMAGE:-ghcr.io/klhq/telegram-gateway:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TELEGRAM_GATEWAY_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      CONFIG_PATH: /etc/telegram-gateway/config.json
    volumes:
      - ./config.json:/etc/telegram-gateway/config.json:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
